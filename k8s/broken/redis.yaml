apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: devops-challenge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          # [ISSUE 9] Security Risk: Password hardcoded in the startup command. 
          # Should use an environment variable mapped from a Kubernetes Secret.
          command: ["redis-server", "--requirepass", "supersecret"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # [ISSUE 10] Data Loss Risk: No volumeMounts or PersistentVolumeClaim defined. 
          # If this pod crashes or restarts, all Redis data will be permanently lost in production.
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: devops-challenge
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      