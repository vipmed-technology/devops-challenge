apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: devops-challenge
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway # [ISSUE 1] This selector expects 'api-gateway'...
  template:
    metadata:
      labels:
        app: gateway   # [ISSUE 1] ...but the template provides 'gateway'. ReplicaSet will fail to manage pods.
    spec:
      containers:
        - name: api-gateway
          image: devops-challenge/api-gateway:latest # [ISSUE 8] Anti-pattern: Using mutable ':latest' tag in production.
          ports:
            - containerPort: 8080 # [ISSUE 7] Mismatch: Declared as 8080, but the app explicitly uses PORT 3000 below.
          env: # [ISSUE 5] Anti-pattern: Hardcoded env vars instead of using `envFrom: - configMapRef: name: app-config`.
            - name: PORT
              value: "3000"
            - name: USER_SERVICE_URL
              value: "http://user-service:3001"
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: devops-challenge
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000
      