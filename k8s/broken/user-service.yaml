apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: devops-challenge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: devops-challenge/user-service:latest # [ISSUE 8] Anti-pattern: Using mutable ':latest' tag in production.
          ports:
            - containerPort: 3001
          env: # [ISSUE 5] Anti-pattern: Hardcoded env vars instead of using the existing ConfigMap.
            - name: PORT
              value: "3001"
            - name: REDIS_HOST
              value: "redis-master" # [ISSUE 3] Wrong DNS: The redis service is named 'redis', not 'redis-master'. Connection will fail.
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 1 # [ISSUE 6] Too aggressive: A single missed ping will kill the pod. Should be at least 3.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: devops-challenge
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - port: 3001
      targetPort: 8080 # [ISSUE 2] Mismatch: Service routes to 8080, but container listens on 3001. Will cause 502 Bad Gateway.
      