apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base configuration
resources:
  - ../../base
  - hpa.yaml

labels:
  - pairs:
      environment: prod

patches:
  - path: patches/replica-count.yaml
  - path: patches/resources.yaml
  # JSON patch for changing Service type to LoadBalancer
  - patch: |-
      - op: replace
        path: /spec/type
        value: LoadBalancer
    target:
      group: ""
      version: v1
      kind: Service
      name: api-gateway

# prod (will be overridden by CI/CD)
images:
  - name: devops-challenge/api-gateway
    newTag: prod-latest
  - name: devops-challenge/user-service
    newTag: prod-latest
