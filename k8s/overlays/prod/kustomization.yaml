apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: devops-challenge-prod
resources:
  - namespace.yaml
  - ../../base
patches:
  - path: patch-deployments.yaml
  - path: patch-hpa.yaml
secretGenerator:
  - name: app-secrets
    behavior: replace
    literals:
      - REDIS_PASSWORD=replace-with-external-secret-sync
generatorOptions:
  disableNameSuffixHash: true
images:
  - name: ghcr.io/example/devops-challenge/api-gateway
    newName: ghcr.io/example/devops-challenge/api-gateway
    newTag: latest
  - name: ghcr.io/example/devops-challenge/user-service
    newName: ghcr.io/example/devops-challenge/user-service
    newTag: latest
