apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Automatically appends 'dev-' to all resource names (Deployments, Services, etc.)
namePrefix: dev-

configMapGenerator:
  - name: app-config
    # 'merge' behavior updates existing keys or adds new ones to the base ConfigMap
    behavior: merge
    literals:
      - LOG_LEVEL=debug
      # Overriding service URLs to match the new 'dev-' namePrefix generated by Kustomize
      - REDIS_HOST=dev-redis
      - USER_SERVICE_URL=http://dev-user-service:3001

secretGenerator:
  - name: app-secrets
    behavior: merge
    literals:
      - redis-password=dev-insecure-password