# IMPORTANT: This is a SECRET TEMPLATE - DO NOT commit actual secrets to Git!
#
# Production secret management strategies:
# 1. External Secrets Operator (ESO) - Syncs from AWS Secrets Manager, Azure Key Vault, etc.
# 2. Sealed Secrets - Encrypts secrets for safe Git storage
# 3. SOPS - Encrypts YAML files with cloud KMS
# 4. CI/CD injection - Create secrets during deployment from pipeline variables
#
# For local development:
# kubectl create secret generic app-secrets \
#   --from-literal=API_KEY=your-key \
#   --from-literal=DB_PASSWORD=your-password \
#   -n devops-challenge

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: devops-challenge
  labels:
    app: devops-challenge
type: Opaque
stringData:
  # Provide actual values via kubectl create or External Secrets Operator
  API_KEY: ""
  DB_PASSWORD: ""
