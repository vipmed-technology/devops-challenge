apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: devops-challenge
  labels:
    app: redis
    component: datastore
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  # Session affinity NOT NEEDED for Redis
  sessionAffinity: None
