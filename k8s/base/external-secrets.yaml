# External Secrets Operator resources
# SecretStore connects to AWS Secrets Manager
# ExternalSecret defines which secrets to sync into K8s Secret objects
#
# Prerequisites:
# - External Secrets Operator installed in the cluster
# - K8s secret "aws-sm-credentials" with keys: access-key, secret-access-key
# - Secrets created in AWS Secrets Manager via the terraform/secrets project

apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: devops-challenge
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-sm-credentials
            key: access-key
          secretAccessKeySecretRef:
            name: aws-sm-credentials
            key: secret-access-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: devops-challenge
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: devops-challenge/dev/redis-password
        property: password
