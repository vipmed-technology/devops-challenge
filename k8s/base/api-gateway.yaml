apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: devops-challenge/api-gateway:local
        # Forces Kubernetes to use the local image loaded into kind instead of pulling from Docker Hub
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        # Injects all variables defined in the 'app-config' ConfigMap as environment variables
        envFrom:
        - configMapRef:
            name: app-config
        # Resource management to prevent CPU/Memory starvation on cluster nodes
        resources:
          requests: # Minimum guaranteed resources
            cpu: "100m"
            memory: "128Mi"
          limits: # Maximum allowed resources before throttling (CPU) or OOMKilled (Memory)
            cpu: "300m"
            memory: "256Mi"
        # Restarts the container if the application becomes completely unresponsive
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 10 # Gives the app time to start before checking
          periodSeconds: 15
        # Stops sending traffic to this Pod if it's not ready to process requests
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  # Routes traffic to any pod matching the 'app: api-gateway' label
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000