apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: devops-challenge
  labels:
    app: api-gateway
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: None
