name: CI/CD

on:
  push:
    branches:
      - main
      - develop
      - solution/luisDanielRodriguezAlza

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/${{ matrix.service }}/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: apps/${{ matrix.service }}
      - name: Run tests
        run: npm test
        working-directory: apps/${{ matrix.service }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/devops-challenge/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/devops-challenge/${{ matrix.service }}:${{ github.ref_name }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0
      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${KUBE_CONFIG_DATA}" | base64 -d > $HOME/.kube/config
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
      - name: Apply manifests
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            kubectl apply -k k8s/overlays/prod
            echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
          else
            kubectl apply -k k8s/overlays/dev
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
          fi
      - name: Update images
        run: |
          kubectl set image deployment/api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/devops-challenge/api-gateway:${{ github.sha }}
          kubectl set image deployment/user-service user-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/devops-challenge/user-service:${{ github.sha }}
      - name: Notify deploy status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = "${{ job.status }}" === "success" ? "success" : "failure";
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: "deploy",
              description: `Deploy ${state} to ${process.env.DEPLOY_ENV || "unknown"}`,
            });
