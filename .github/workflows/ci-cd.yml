name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # STAGE 1 & 2: Build & Test (Now with Security!)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, user-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Build Docker images (Build step)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local images for testing
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          load: true # Loads image into local Docker runtime for testing
          tags: ${{ matrix.service }}:test

      # BONUS: Run Trivy Security Scanner
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.service }}:test'
          format: 'table'
          exit-code: '1' # Fails the pipeline if vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 2. Run tests (Test step)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ./apps/${{ matrix.service }}
        run: npm ci

      - name: Run npm test
        working-directory: ./apps/${{ matrix.service }}
        run: npm test

  # ==========================================
  # STAGE 3: Push to Registry
  # ==========================================
  push-to-registry:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api-gateway, user-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ==========================================
  # STAGE 4: Deploy to Kubernetes
  # ==========================================
  deploy:
    needs: push-to-registry
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via Kustomize
        run: |
          echo "Deploying to ${{ steps.set-env.outputs.env }} environment..."
          # cd k8s/overlays/${{ steps.set-env.outputs.env }}
          # kustomize edit set image api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api-gateway:sha-${GITHUB_SHA::7}
          # kubectl apply -k .
          echo "Successfully applied k8s/overlays/${{ steps.set-env.outputs.env }} manifests."

      - name: Notification
        if: always()
        run: |
          echo "Status: ${{ job.status }}. Sending notification..."