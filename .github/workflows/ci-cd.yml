name: ci-cd

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/devops-challenge/${{ matrix.service }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Write kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ github.ref == 'refs/heads/main' && secrets.KUBE_CONFIG_PROD || secrets.KUBE_CONFIG_DEV }}
        run: |
          mkdir -p "${HOME}/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "${HOME}/.kube/config"

      - name: Set deployment images
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          cd k8s/overlays/${DEPLOY_ENV}
          kustomize edit set image ghcr.io/example/devops-challenge/api-gateway=${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/devops-challenge/api-gateway:${IMAGE_TAG}
          kustomize edit set image ghcr.io/example/devops-challenge/user-service=${REGISTRY}/${GITHUB_REPOSITORY_OWNER}/devops-challenge/user-service:${IMAGE_TAG}

      - name: Deploy with kubectl
        run: kubectl apply -k k8s/overlays/${DEPLOY_ENV}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api-gateway -n devops-challenge-${DEPLOY_ENV} --timeout=180s
          kubectl rollout status deployment/user-service -n devops-challenge-${DEPLOY_ENV} --timeout=180s

      - name: Notify on deploy result
        if: always() && secrets.DEPLOY_WEBHOOK_URL != ''
        env:
          DEPLOY_STATUS: ${{ job.status }}
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          curl -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"repository\":\"${GITHUB_REPOSITORY}\",\"environment\":\"${DEPLOY_ENV}\",\"status\":\"${DEPLOY_STATUS}\",\"sha\":\"${GITHUB_SHA}\"}"
