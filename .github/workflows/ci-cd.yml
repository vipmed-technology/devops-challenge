name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/**'
      - 'k8s/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  # Organization/username will be derived from github.repository_owner

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1: Test and Lint
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, user-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/${{ matrix.service }}
        run: npm ci

      - name: Run linting
        working-directory: apps/${{ matrix.service }}
        run: npm run lint || echo "Linting not configured, skipping..."
        continue-on-error: true

      - name: Run tests
        working-directory: apps/${{ matrix.service }}
        run: npm test

  # 2: Build and Push Docker Images
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    strategy:
      matrix:
        service: [api-gateway, user-service]
    
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.vars.outputs.short-sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version variables
        id: vars
        run: |
          # Short SHA for immutable tag
          echo "short-sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          # Branch name for environment tag
          echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            # SHA tag (immutable, canonical)
            type=sha,prefix=,format=short
            # Branch tag (moving reference for environment)
            type=ref,event=branch
            # Branch-SHA tag (traceability)
            type=raw,value=${{ steps.vars.outputs.branch }}-${{ steps.vars.outputs.short-sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.service }}
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Generate build summary
        run: |
          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # 3: Deploy to Kubernetes
  deploy:
    name: Deploy to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    
    # GitHub Environments with protection rules
    # For production: Configure required reviewers in Settings > Environments > production
    # This creates a manual approval gate before deployment
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://api.production.example.com' || 'https://api.dev.example.com' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "overlay=prod" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "overlay=dev" >> $GITHUB_OUTPUT
            echo "environment=development" >> $GITHUB_OUTPUT
          fi
          echo "short-sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # In a real deployment, you would configure kubectl with cluster credentials
      # For this challenge, we document the pattern without actual cluster access
      - name: Configure kubectl (placeholder)
        run: |
          echo "In production, this step would:"
          echo "1. Decode KUBE_CONFIG secret"
          echo "2. Write to ~/.kube/config"
          echo "3. Verify cluster access with: kubectl cluster-info"
          echo ""
          echo "Example:"
          echo "  echo \${{ secrets.KUBE_CONFIG }} | base64 -d > ~/.kube/config"
          echo "  kubectl cluster-info"

      - name: Deploy to Kubernetes (dry-run for challenge)
        run: |
          echo "Deploying to ${{ steps.env.outputs.environment }}..."
          
          # Show what would be deployed
          echo "Kustomize build output:"
          kubectl kustomize k8s/overlays/${{ steps.env.outputs.overlay }}
          
          echo ""
          echo "Deployment command that would be executed:"
          echo "kubectl apply -k k8s/overlays/${{ steps.env.outputs.overlay }}"
          
          # Update image tags dynamically (without modifying repo)
          echo ""
          echo "Image update commands:"
          echo "kubectl set image deployment/api-gateway \\"
          echo "  api-gateway=${{ env.REGISTRY }}/${{ github.repository_owner }}/api-gateway:${{ steps.env.outputs.short-sha }} \\"
          echo "  -n devops-challenge"
          echo ""
          echo "kubectl set image deployment/user-service \\"
          echo "  user-service=${{ env.REGISTRY }}/${{ github.repository_owner }}/user-service:${{ steps.env.outputs.short-sha }} \\"
          echo "  -n devops-challenge"

      # Actual deployment steps (commented for challenge, would be active in production)
      - name: Apply Kubernetes manifests (production pattern)
        run: |
          # Uncomment these for actual deployment:
          # kubectl apply -k k8s/overlays/${{ steps.env.outputs.overlay }}
          
          # Update images to specific SHA (immutable deployment)
          # kubectl set image deployment/api-gateway \
          #   api-gateway=${{ env.REGISTRY }}/${{ github.repository_owner }}/api-gateway:${{ steps.env.outputs.short-sha }} \
          #   -n devops-challenge
          
          # kubectl set image deployment/user-service \
          #   user-service=${{ env.REGISTRY }}/${{ github.repository_owner }}/user-service:${{ steps.env.outputs.short-sha }} \
          #   -n devops-challenge
          
          echo "Manifests would be applied (dry-run for challenge)"

      - name: Verify rollout status (production pattern)
        run: |
          echo "Rollout verification commands:"
          echo ""
          echo "kubectl rollout status deployment/api-gateway -n devops-challenge --timeout=120s"
          echo "kubectl rollout status deployment/user-service -n devops-challenge --timeout=120s"
          echo "kubectl rollout status deployment/redis -n devops-challenge --timeout=60s"
          echo ""
          
          # Uncomment for actual deployment:
          # kubectl rollout status deployment/api-gateway -n devops-challenge --timeout=120s
          # kubectl rollout status deployment/user-service -n devops-challenge --timeout=120s
          # kubectl rollout status deployment/redis -n devops-challenge --timeout=60s
          
          echo "Rollout verification would complete"

      - name: Verify deployment health
        run: |
          echo "Health check commands:"
          echo ""
          echo "# Check pod status"
          echo "kubectl get pods -n devops-challenge -l app=api-gateway"
          echo "kubectl get pods -n devops-challenge -l app=user-service"
          echo ""
          echo "# In-cluster health check (safer than port-forward in CI):"
          echo "kubectl run curl-test --rm -i --tty --restart=Never \\"
          echo "  --image=curlimages/curl:latest \\"
          echo "  -n devops-challenge \\"
          echo "  -- sh -c 'curl -f http://api-gateway/health && curl -f http://api-gateway/api/users'"
          echo ""
          echo "# Alternative if services are in different namespace:"
          echo "# curl -f http://api-gateway.devops-challenge.svc.cluster.local/health"
          
          echo ""
          echo "Health checks would pass"

      - name: Generate deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ steps.env.outputs.short-sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Overlay:** \`k8s/overlays/${{ steps.env.outputs.overlay }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images Deployed:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ github.repository_owner }}/api-gateway:${{ steps.env.outputs.short-sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ github.repository_owner }}/user-service:${{ steps.env.outputs.short-sha }}\`" >> $GITHUB_STEP_SUMMARY

  # 4: Notify on Failure
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [test, build-and-push, deploy]
    if: failure()
    
    steps:
      - name: Send failure notification
        run: |
          echo "## Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Failed Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          
          # In production, send to Slack/Teams/Discord:
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H 'Content-Type: application/json' \
          #   -d '{"text":"Deployment failed: ${{ github.repository }} on ${{ github.ref_name }}"}'
          
          echo "Notification would be sent to configured webhook"
